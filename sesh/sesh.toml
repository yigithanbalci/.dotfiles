#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json
# blacklist FloaX pop-up session
blacklist = ["scratch"]

cache = false

sort_order = [
  "tmuxinator", # show first
  "config",
  "tmux",
  "zoxide",     # show last
]

# open the file manager
[[session]]
name = "Downloads 📥"
path = "~/Downloads"
startup_command = "yazi"

[[session]]
name = "Documents 📥"
path = "~/Documents"
startup_command = "yazi"
