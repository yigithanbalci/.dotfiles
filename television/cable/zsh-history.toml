[metadata]
name = "zsh-history"
description = "A channel to select from your zsh history"
requirements = ["zsh"]

[source]
command = "sed '1!G;h;$!d' ${HISTFILE:-${HOME}/.zsh_history} | awk '/^: [0-9]+:[0-9]+;/{cmd=substr($0,index($0,\";\")+1); gsub(/^[[:space:]]+/,\"\",cmd); gsub(/[[:space:]]+$/,\"\",cmd); if(cmd!=\"\" && !seen[cmd]++) print cmd}'"
display = "{}"
output = "{}"
no_sort = true
frecency = false

[actions.execute]
description = "Execute the selected command"
command = "zsh -c '{}'"
mode = "execute"
